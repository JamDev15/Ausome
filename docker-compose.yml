version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: eboyapp_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-eboyapp}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-eboyapp_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-eboyapp}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eboyapp_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eboyapp_api
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://${MONGO_USER:-eboyapp}:${MONGO_PASSWORD:-eboyapp_secret}@mongo:27017/${MONGO_DB:-eboyapp}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
  redis_data:
  media_files:
