<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ausome App Icon
  Export this as a 1024×1024 PNG for App Store / Google Play.
  Use an SVG→PNG tool (Inkscape, Figma, or `rsvg-convert -w 1024 -h 1024 icon-mark.svg -o icon.png`)
-->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#6EC6A1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Periodic-table dividers -->
  <rect x="44" y="130" width="424" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="44" y="356" width="424" height="2" rx="1" fill="rgba(255,255,255,0.25)"/>

  <!-- "GOLD" label -->
  <text x="256" y="102"
    text-anchor="middle"
    fill="rgba(255,255,255,0.75)"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="44" font-weight="700" letter-spacing="16">GOLD</text>

  <!-- "Au" element symbol — the heart of the mark -->
  <text x="256" y="314"
    text-anchor="middle"
    fill="white"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="188" font-weight="900">Au</text>

  <!-- Atomic number "79" -->
  <text x="256" y="432"
    text-anchor="middle"
    fill="rgba(255,255,255,0.75)"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" letter-spacing="10">79</text>
</svg>
